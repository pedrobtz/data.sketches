# Runs covr to measure test coverage and updates a static badge committed to
# the repository, avoiding external badge services.
on:
  push:
    branches: [main, master]
    paths-ignore:
      - ".github/badges/coverage.svg"
  pull_request:
  workflow_dispatch:

name: coverage.yaml

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"all"'
          extra-packages: any::covr

      - name: Run coverage
        id: coverage
        run: |
          cov <- covr::package_coverage(quiet = FALSE)
          pct <- covr::percent_coverage(cov)
          color <-
            if (pct >= 90) "green" else
            if (pct >= 75) "yellow" else
            if (pct >= 60) "orange" else "red"
          cat(sprintf("pct=%.1f\n", pct), file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)
          cat(sprintf("color=%s\n", color), file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)

          out <- capture.output(print(cov))
          md <- c("## Coverage", "```", out, "```")
          writeLines(md, Sys.getenv("GITHUB_STEP_SUMMARY"))
        shell: Rscript {0}

      - name: Render badge
        run: |
          mkdir -p .github/badges
          npx badgen-cli --subject covr --status "${{ steps.coverage.outputs.pct }}%" --color "${{ steps.coverage.outputs.color }}" > .github/badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg
          if git diff --staged --quiet; then
            echo "Coverage badge unchanged (${PCT}%)."
          else
            git commit -m "Update coverage badge (${PCT}%)"
            git push
          fi
        env:
          PCT: ${{ steps.coverage.outputs.pct }}
